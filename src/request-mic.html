<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1b1b1f;
      color: #ececf1;
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    .card {
      max-width: 440px;
      padding: 32px;
      text-align: center;
      background: #242429;
      border: 1px solid #33333a;
      border-radius: 14px;
    }
    h1 { font-size: 18px; margin: 0 0 10px; }
    p { color: #b6b6c0; line-height: 1.6; font-size: 14px; }
    .state { margin-top: 16px; font-weight: 600; }
    .ok { color: #22c55e; }
    .err { color: #fca5a5; }
    button {
      margin-top: 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 9px;
      padding: 11px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Microphone access</h1>
    <p>Media Grabber needs your permission to record from the microphone. Click below and choose
      <b>Allow</b>. You only need to do this once.</p>
    <button id="grant">Allow microphone</button>
    <div id="state" class="state"></div>
  </div>
  <script src="request-mic.js"></script>
</body>
</html>
