<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="brand">
      <svg class="logo" viewBox="0 0 48 48" aria-hidden="true">
        <rect x="2" y="2" width="44" height="44" rx="11" fill="url(#g)" />
        <path d="M24 13 v12" stroke="#fff" stroke-width="4" stroke-linecap="round" />
        <path d="M16 22 l8 9 l8 -9 Z" fill="#fff" />
        <rect x="14" y="34" width="20" height="3.6" rx="1.8" fill="#fff" />
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#4f46e5" />
            <stop offset="1" stop-color="#7c3aed" />
          </linearGradient>
        </defs>
      </svg>
      <span class="name">Media Grabber</span>
    </div>
    <div class="actions">
      <button id="refresh" title="Re-scan page" aria-label="Re-scan page">
        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M12 5V2L8 6l4 4V7a5 5 0 1 1-5 5H5a7 7 0 1 0 7-7z"/></svg>
      </button>
      <button id="clear" title="Clear list" aria-label="Clear list">
        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M6 7h12v13a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V7zm3-4h6l1 2h4v2H4V5h4l1-2z"/></svg>
      </button>
    </div>
  </header>

  <div class="recordbar">
    <button id="record" class="record" title="Open the audio recorder (tab, microphone, or both)">
      <span class="dot"></span>
      <span>Record audio</span>
    </button>
  </div>

  <div id="empty" class="empty">
    No media detected yet.<br />
    Start playing the audio or video, then press re-scan.
  </div>

  <ul id="list"></ul>

  <footer>
    <span id="count">0 items</span>
    <a id="github" class="github" href="https://github.com/riponcm/media-grabber"
       target="_blank" rel="noopener noreferrer" title="Star Media Grabber on GitHub">
      <svg class="gh-mark" viewBox="0 0 16 16" width="15" height="15" aria-hidden="true">
        <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      <span>Star on GitHub</span>
      <svg class="gh-star" viewBox="0 0 24 24" width="13" height="13" aria-hidden="true">
        <path fill="currentColor" d="M12 17.3l-6.18 3.7 1.64-7.03L2 9.24l7.19-.61L12 2l2.81 6.63 7.19.61-5.46 4.73 1.64 7.03z"/>
      </svg>
    </a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
